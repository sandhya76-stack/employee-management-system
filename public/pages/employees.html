</head>

  <!-- Sidebar -->

      <p>Employee Management</p>

  <li><a href="tasks.html"><span>✅</span> Tasks</a></li>

  </div>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Topbar -->
    <div class="topbar">
      <h2>Employees</h2>
      <div class="topbar-right">
        <span class="user-info" id="user-name"></span>
        <button class="btn-primary" style="width:auto;padding:8px 16px;" onclick="openModal()">+ Add Employee</button>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <input type="text" id="search-name" placeholder="Search by name..." />
      <input type="text" id="search-dept" placeholder="Search by department..." />
      <button class="btn-primary" style="width:auto;padding:10px 20px;" onclick="searchEmployees()">Search</button>
    </div>

    <!-- Employees Table -->
    <div class="table-container">
      <div class="table-header">
        <h3>All Employees</h3>
      </div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Designation</th>
            <th>Skills</th>
            <th>Role</th>
          </tr>
        </thead>
        <tbody id="employees-table">
          <tr><td colspan="7">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<!-- Add Employee Modal -->
<div class="modal" id="employee-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Add New Employee</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="emp-name" placeholder="Full name" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="emp-email" placeholder="Email address" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="emp-password" placeholder="Password" />
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="emp-role">
        <option value="employee">Employee</option>
        <option value="manager">Manager</option>
        <option value="super_admin">Super Admin</option>
      </select>
    </div>
    <div class="form-group">
      <label>Department ID</label>
      <input type="number" id="emp-dept" placeholder="Department ID" />
    </div>
    <div class="form-group">
      <label>Designation</label>
      <input type="text" id="emp-designation" placeholder="e.g. Software Engineer" />
    </div>
    <div class="form-group">
      <label>Skills</label>
      <input type="text" id="emp-skills" placeholder="e.g. JavaScript, Node.js" />
    </div>
    <button class="btn-primary" onclick="addEmployee()">Add Employee</button>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');
  if (!token) window.location.href = '/index.html';
  document.getElementById('user-name').textContent = `Role: ${role}`;

  // Load Employees
  async function loadEmployees() {
    const res = await fetch('/api/employees', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const employees = await res.json();
    renderEmployees(employees);
  }

  // Render Employees
  function renderEmployees(employees) {
    const tbody = document.getElementById('employees-table');
    if (employees.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7">No employees found</td></tr>';
      return;
    }
    tbody.innerHTML = employees.map(e => `
      <tr>
        <td>${e.id}</td>
        <td>${e.name}</td>
        <td>${e.email}</td>
        <td>${e.department_name}</td>
        <td>${e.designation}</td>
        <td>${e.skills}</td>
        <td><span class="badge badge-info">${e.role}</span></td>
      </tr>
    `).join('');
  }

  // Search Employees
  async function searchEmployees() {
    const name = document.getElementById('search-name').value;
    const dept = document.getElementById('search-dept').value;

    let url = '/api/search/employees?';
    if (name) url += `name=${name}&`;
    if (dept) url += `department=${dept}&`;

    const res = await fetch(url, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const employees = await res.json();
    renderEmployees(employees);
  }

  // Add Employee
  async function addEmployee() {
    const name = document.getElementById('emp-name').value;
    const email = document.getElementById('emp-email').value;
    const password = document.getElementById('emp-password').value;
    const empRole = document.getElementById('emp-role').value;
    const department_id = document.getElementById('emp-dept').value;
    const designation = document.getElementById('emp-designation').value;
    const skills = document.getElementById('emp-skills').value;

    // First register the user
    const registerRes = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ name, email, password, role: empRole })
    });

    const registerData = await registerRes.json();

    if (registerRes.ok) {
      // Then create employee profile
      const empRes = await fetch('/api/employees', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({
          user_id: registerData.user.id,
          department_id,
          designation,
          skills
        })
      });

      if (empRes.ok) {
        closeModal();
        loadEmployees();
        alert('Employee added successfully!');
      }
    } else {
      alert(registerData.message || 'Error adding employee!');
    }
  }

  function openModal() { document.getElementById('employee-modal').classList.add('active'); }
  function closeModal() { document.getElementById('employee-modal').classList.remove('active'); }

  function logout() {
    localStorage.clear();
    window.location.href = '/index.html';
  }

  loadEmployees();
</script>

</body>
</html>
