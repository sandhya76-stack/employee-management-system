<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - EMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <h2>🏢 EMS</h2>
      <p>Employee Management</p>
    </div>
    <ul class="sidebar-menu">
      <li><a href="dashboard.html"><span>📊</span> Dashboard</a></li>
      <li><a href="tasks.html"><span>✅</span> Tasks</a></li>
      <li><a href="employees.html"><span>👥</span> Employees</a></li>
      <li><a href="attendance.html"><span>🕐</span> Attendance</a></li>
      <li><a href="reports.html"><span>📋</span> Reports</a></li>
      <li><a href="departments.html"><span>🏢</span> Departments</a></li>
      <li><a href="notifications.html" class="active"><span>🔔</span> Notifications</a></li>
      <li><a href="profile.html"><span>👤</span> Profile</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Topbar -->
    <div class="topbar">
      <h2>🔔 Notifications</h2>
      <div class="topbar-right">
        <span class="user-info" id="user-name"></span>
        <button class="btn-primary" style="width:auto;padding:8px 16px;" onclick="markAllRead()">Mark All Read</button>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- Notifications List -->
    <div class="table-container">
      <div class="table-header">
        <h3>All Notifications</h3>
        <span id="unread-count" class="badge badge-danger"></span>
      </div>
      <div id="notifications-list">
        <p>Loading...</p>
      </div>
    </div>

  </div>
</div>

<style>
  .notification-item {
    padding: 16px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .notification-item.unread {
    background: #eff6ff;
    border-left: 4px solid #2563eb;
  }
  .notification-item.read {
    background: #fff;
    border-left: 4px solid transparent;
  }
  .notification-title {
    font-weight: 600;
    font-size: 0.95rem;
    color: #1e293b;
    margin-bottom: 4px;
  }
  .notification-message {
    font-size: 0.85rem;
    color: #64748b;
  }
  .notification-time {
    font-size: 0.75rem;
    color: #94a3b8;
    white-space: nowrap;
  }
  .notification-actions {
    display: flex;
    gap: 8px;
  }
</style>

<script>
  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');
  if (!token) window.location.href = '/index.html';
  document.getElementById('user-name').textContent = `Role: ${role}`;

  // Load Notifications
  async function loadNotifications() {
    const res = await fetch('/api/notifications', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const notifications = await res.json();

    // Count unread
    const unread = notifications.filter(n => !n.is_read).length;
    const unreadCount = document.getElementById('unread-count');
    if (unread > 0) {
      unreadCount.textContent = `${unread} Unread`;
    }

    const list = document.getElementById('notifications-list');
    if (notifications.length === 0) {
      list.innerHTML = '<p style="padding:20px;color:#64748b;">No notifications found</p>';
      return;
    }

    list.innerHTML = notifications.map(n => `
      <div class="notification-item ${n.is_read ? 'read' : 'unread'}">
        <div>
          <div class="notification-title">${n.title}</div>
          <div class="notification-message">${n.message}</div>
        </div>
        <div class="notification-time">
          ${new Date(n.created_at).toLocaleDateString()}
          ${new Date(n.created_at).toLocaleTimeString()}
        </div>
        <div class="notification-actions">
          ${!n.is_read ? `<button class="btn-success" onclick="markRead(${n.id})">Mark Read</button>` : ''}
          <button class="btn-danger" onclick="deleteNotification(${n.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  // Mark As Read
  async function markRead(id) {
    await fetch(`/api/notifications/${id}/read`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    loadNotifications();
  }

  // Mark All As Read
  async function markAllRead() {
    await fetch('/api/notifications/read-all', {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    loadNotifications();
    alert('All notifications marked as read!');
  }

  // Delete Notification
  async function deleteNotification(id) {
    if (!confirm('Delete this notification?')) return;
    await fetch(`/api/notifications/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    loadNotifications();
  }

  function logout() {
    localStorage.clear();
    window.location.href = '/index.html';
  }

  loadNotifications();
</script>

</body>
</html>
